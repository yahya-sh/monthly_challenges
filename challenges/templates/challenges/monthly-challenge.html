{% extends "base.html" %}
{% block page_title %}{{ month|title }} Challenge{% endblock page_title %}
{% block content %}
    <h1>{{ month|title  }} Challenge</h1>
    {% if challenge is not None %}
    <h2>{{challenge}}</h2>
    {% else %}
    <h2>There is no challenge for this month yet!</h2>
    {% endif %}
{% endblock content %}
